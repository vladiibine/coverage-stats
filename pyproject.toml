[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coverage-stats"
version = "0.1.0"
description = "Enhanced coverage reporting: direct vs incidental line hit counts"
requires-python = ">=3.9"
dependencies = [
    "coverage>=7.0",
    "pytest>=7.0",
]

[project.scripts]
coverage-stats = "coverage_stats.cli:main"

[project.entry-points."pytest11"]
coverage-stats = "coverage_stats.pytest_plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/coverage_stats"]

[tool.pytest.ini_options]
testpaths = ["tests"]
